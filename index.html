<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Robot Monitoring</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="grid-background">
        <svg class="grid-pattern" aria-hidden="true">
            <defs>
                <pattern id="grid-pattern-login" width="40" height="40" patternUnits="userSpaceOnUse" x="-1" y="-1">
                    <path d="M.5 40V.5H40" fill="none"></path>
                </pattern>
            </defs>
            <rect width="100%" height="100%" stroke-width="0" fill="url(#grid-pattern-login)"></rect>
        </svg>
    </div>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="mouse-spotlight"></div>
            
            <!-- Aceternity Spotlight SVG -->
            <svg class="spotlight-svg animate-spotlight" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3787 2842" fill="none">
                <g filter="url(#filter-spotlight)">
                    <ellipse cx="1924.71" cy="273.501" rx="1924.71" ry="273.501" transform="matrix(-0.822377 -0.568943 -0.568943 0.822377 3631.88 2291.09)" fill="white" fill-opacity="0.1"></ellipse>
                </g>
                <defs>
                    <filter id="filter-spotlight" x="0.860352" y="0.838989" width="3785.16" height="2840.26" filterUnits="userSpaceOnUse" colorInterpolationFilters="sRGB">
                        <feFlood flood-opacity="0" result="BackgroundImageFix"></feFlood>
                        <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"></feBlend>
                        <feGaussianBlur stdDeviation="151" result="effect1_foregroundBlur_1065_8"></feGaussianBlur>
                    </filter>
                </defs>
            </svg>

            <!-- Left Side: Form -->
            <div class="auth-form-side text-center">
                <div class="mb-4">
                    <i class="bi bi-robot text-cyan" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">ROBOTRACK</h2>
                    <p class="text-muted">Warehouse Monitoring System</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3 text-start">
                        <label class="form-label small uppercase">Email Address (Gunakan email terdaftar)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
                            <input type="email" class="form-control border-start-0 border-secondary-subtle" placeholder="name@company.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-4 text-start">
                        <label class="form-label small uppercase">Password (Masukkan kata sandi Anda)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" class="form-control border-start-0 border-secondary-subtle" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-cyan w-100 py-3 fw-bold mb-3">
                        Sign In <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                    
                    <p class="text-muted small">
                        Don't have an account? <a href="register.html" class="text-cyan text-decoration-none">Register here</a>
                    </p>
                </form>
            </div>

            <!-- Right Side: 3D Scene -->
            <div class="auth-3d-side">
                <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.93/build/spline-viewer.js"></script>
                <spline-viewer url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode"></spline-viewer>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>
</html>
